<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/basic.css}">
</head>
<body>
<h2>レビュ編集確認</h2>
<table th:object="${reviewEditForm}">
    <tr>
        <td>【ID】</td>
        <td th:text="*{reviewId}"></td>
    </tr>
    <tr>
        <td>【店舗】</td>
        <td th:text="*{restaurantId} + ' ' + *{restaurantName} "></td>
    </tr>
    <tr>
        <td>【利用者ID】</td>
        <td th:text="*{userId}"></td>
    </tr>
    <tr>
        <td>【来店日】</td>
        <td th:text="*{visitDate}"></td>
    </tr>
    <tr>
        <td>【評価】</td>
        <td th:text="*{rating}"></td>
    </tr>
    <tr>
        <td>【コメント】</td>
        <td th:text="*{comment}"></td>
    </tr>
</table>
<form th:action="@{/confirm-edit-review}" th:object="${reviewEditForm}" method="POST">
    <input th:field="*{reviewId}" type="hidden">
    <input th:field="*{restaurantId}" type="hidden">
    <input th:field="*{userId}" type="hidden">
    <input th:field="*{visitDate}" type="hidden">
    <input th:field="*{rating}" type="hidden">
    <input th:field="*{comment}" type="hidden">
    <input type="submit" value="更新実行">
</form>
<form th:action="@{/show-edt-form}" th:object="${reviewEditForm}" method="POST">
        <input th:field="*{reviewId}" type="hidden">
        <input th:field="*{restaurantId}" type="hidden">
        <input th:field="*{restaurantName}" type="hidden">
        <input th:field="*{userId}" type="hidden">
        <input th:field="*{visitDate}" type="hidden">
        <input th:field="*{rating}" type="hidden">
        <input th:field="*{comment}" type="hidden">
    <input type="submit" value="戻る">
</form>
</body>
</html>

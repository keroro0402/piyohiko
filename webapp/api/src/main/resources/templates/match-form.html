<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>登録</h2>
<div th:if="${errorMessage}" th:text="${errorMessage}"></div>
<form th:action="@{/match-complete}" method="POST" th:object="${matchForm}">
    <div>
        <label for="date">日付</label>
        <input type="date" id="date" th:field="*{date}">
    </div>
    <div th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
    <div>
        <label for="place">場所</label>
        <input type="text" id="place" th:field="*{place}">
    </div>
    <div th:if="${#fields.hasErrors('place')}" th:errors="*{place}"></div>
    <div>
        <label for="maxPlayers">最大人数</label>
        <input type="number" id="maxPlayers" th:field="*{maxPlayers}">
    </div>
    <div th:if="${#fields.hasErrors('maxPlayers')}" th:errors="*{maxPlayers}"></div>
    <input type="submit" value="送信">
</form>
</body>
</html>

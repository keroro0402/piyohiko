<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>レビュー登録</h2>
<form th:action="@{/register-review}" th:object="${reviewRegisterForm}" method="POST">
    <div>
        <label for="restaurantId">【店舗ID】</label><br>
        <p th:text="*{restaurantId} + ' ' + *{restaurantName}"></p>
        <input type="hidden" id="restaurantId" th:field="*{restaurantId}">
        <input type="hidden" id="restaurantName" th:field="*{restaurantName}">
        <!-- エラー表示 -->
        <div th:if="${#fields.hasErrors('restaurantId')}" th:errors="*{restaurantId}" style="color:red"></div>
    </div>
    <div>
        <label for="userId">【利用者ID】</label><br>
        <input id="userId" th:field="*{userId}" type="text">
        <!-- エラー表示 -->
        <div th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}" style="color:red"></div>
    </div>
    <div>
        <label for="visitDate">【来店日】</label><br>
        <input id="visitDate" th:field="*{visitDate}" type="date">
        <!-- エラー表示 -->
        <div th:if="${#fields.hasErrors('visitDate')}" th:errors="*{visitDate}" style="color:red"></div>
    </div>
    <div>
        <label for="rating">【評価】</label><br>
        <select th:field="*{rating}" id="rating">
            <option value="0">選択してください</option>
            <option th:each="option : ${#numbers.sequence(1,5)}"
                    th:value="${option}"
                    th:text="${option}">
            </option>
        </select>
        <!-- エラー表示 -->
        <div th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" style="color:red"></div>
    </div>
    <div>
        <label for="comment">【コメント】</label><br>
        <input id="comment" th:field="*{comment}" type="text">
        <!-- エラー表示 -->
        <div th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}" style="color:red"></div>
    </div>
    <input type="submit" value="送信">
</form>

<p>
    <a th:href="@{/top}">トップページに戻る</a>
</p>
</body>
</html>

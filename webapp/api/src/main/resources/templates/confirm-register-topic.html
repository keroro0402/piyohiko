<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
</head>
<body>
<h1 th:text="${title}"></h1>
<p th:text="${messageExplanation}"></p>

<div>
    <p th:text="${registrationId}"></p>
    <p th:text="${topicRegistrationForm.registrationId}"></p>
</div>
<div>
    <p th:text="${userId}"></p>
    <p th:text="${topicRegistrationForm.userId}"></p>
</div>
<div>
    <p th:text="${registrationDate}"></p>
    <p th:text="${topicRegistrationForm.registrationDate}"></p>
</div>
<div>
    <p th:text="${topicTitle}"></p>
    <p th:text="${topicRegistrationForm.topicTitle}"></p>
</div>
<div>
    <p th:text="${topicContent}"></p>
    <p th:text="${topicRegistrationForm.topicContent}"></p>
</div>
<form th:action="@{/complete-register-topic}" method="POST" th:object="${topicRegistrationForm}">
    <input type="hidden" th:field="*{registrationId}">
    <input type="hidden" th:field="*{userId}">
    <input type="hidden" th:field="*{registrationDate}">
    <input type="hidden" th:field="*{topicTitle}">
    <input type="hidden" th:field="*{topicContent}">
    <input type="submit" th:value="${messageToCompleteRegister}">
</form>
<form th:action="@{/show-topic-form-re}" method="POST" th:object="${topicRegistrationForm}">
    <input type="hidden" th:field="*{registrationId}">
    <input type="hidden" th:field="*{userId}">
    <input type="hidden" th:field="*{registrationDate}">
    <input type="hidden" th:field="*{topicTitle}">
    <input type="hidden" th:field="*{topicContent}">
    <input type="submit" th:value="${messageToRegister}">
</form>
</body>
</html>

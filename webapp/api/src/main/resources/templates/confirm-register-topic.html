<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${templateTitle}"></title>
</head>
<body>
<h1 th:text="${templateTitle}"></h1>
<p>登録実行ボタン押下で以下の内容を登録します</p>

<div>
    <p th:text="${templateRegistrationId}"></p>
    <p th:text="${topicRegistrationForm.registrationId}"></p>
</div>
<div>
    <p th:text="${templateUserId}"></p>
    <p th:text="${topicRegistrationForm.userId}"></p>
</div>
<div>
    <p th:text="${templateVisitDate}"></p>
    <p th:text="${topicRegistrationForm.visitDate}"></p>
</div>
<div>
    <p th:text="${templateTopicTitle}"></p>
    <p th:text="${topicRegistrationForm.topicTitle}"></p>
</div>
<div>
    <p th:text="${templateTopicContent}"></p>
    <p th:text="${topicRegistrationForm.topicContent}"></p>
</div>
<form th:action="@{/complete-register-topic}" method="POST" th:object="${topicRegistrationForm}">
    <input type="hidden" th:field="*{registrationId}">
    <input type="hidden" th:field="*{userId}">
    <input type="hidden" th:field="*{visitDate}">
    <input type="hidden" th:field="*{topicTitle}">
    <input type="hidden" th:field="*{topicContent}">
    <input type="submit" value="登録実行">
</form>
<form th:action="@{/show-topic-form-re}" method="POST" th:object="${topicRegistrationForm}">
    <input type="hidden" th:field="*{registrationId}">
    <input type="hidden" th:field="*{userId}">
    <input type="hidden" th:field="*{visitDate}">
    <input type="hidden" th:field="*{topicTitle}">
    <input type="hidden" th:field="*{topicContent}">
    <input type="submit" value="戻る">
</form>
</body>
</html>

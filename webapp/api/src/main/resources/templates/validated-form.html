<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:action="@{/comfirm}" method="POST" th:object="${validatedForm}">
    <div>
        <label for="name">名前</label>
        <input type="text" th:field="*{name}" id="name">

    <div>
        <input type="submit" value="送信">

</form>
</body>
</html>

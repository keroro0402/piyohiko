<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{/css/basic.css}">
</head>
<body>
<h2>レビュ登録確認</h2>
<table th:object="${reviewRegisterForm}">
    <tr>
        <td>【店舗ID】</td>
        <td th:text="*{restaurantId} + ' ' + *{restaurantName} "></td>
    </tr>
    <tr>
        <td>【利用者ID】</td>
        <td th:text="*{userId}"></td>
    </tr>
    <tr>
        <td>【来店日】</td>
        <td th:text="*{visitDate}"></td>
    </tr>
    <tr>
        <td>【評価】</td>
        <td th:text="*{rating}"></td>
    </tr>
    <tr>
        <td>【コメント】</td>
        <td th:text="*{comment}"></td>
    </tr>
</table>
<form th:action="@{/confirm-register-review}" th:object="${reviewRegisterForm}" method="POST">
    <input th:field="*{restaurantId}" type="hidden">
    <input th:field="*{userId}" type="hidden">
    <input th:field="*{visitDate}" type="hidden">
    <input th:field="*{rating}" type="hidden">
    <input th:field="*{comment}" type="hidden">
    <input type="submit" value="登録する">
</form>
<form th:action="@{/register-review-ret}" th:object="${reviewRegisterForm}" method="POST">
        <input th:field="*{restaurantId}" type="hidden">
        <input th:field="*{restaurantName}" type="hidden">
        <input th:field="*{userId}" type="hidden">
        <input th:field="*{visitDate}" type="hidden">
        <input th:field="*{rating}" type="hidden">
        <input th:field="*{comment}" type="hidden">
    <input type="submit" value="再入力ページへ">
</form>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
</head>
<body>
<h1 th:text="${title}"></h1>
<!-- @{...} ...をURLに変換するリンク式 -->
<!-- th:object="${Modelに格納されているオブジェクト名}" 指定したオブジェクトを、子要素の th:field で参照できるようにする -->
<form th:action="@{/confirm-register-topic}" method="POST" th:object="${topicRegistrationForm}">
    <div>
        <!--
        th:text で変数を view の文字列へ動的に反映できる
        -->
        <label for="registrationId" th:text="${registrationId}"></label><br>
        <!-- th:field="*{フィールド名}"
        とすると、input に入力された値が
        topicRegistrationForm オブジェクトのフィールドに自動バインディングされ、
        設定したフィールド名がname・id・value属性にも展開される
        *　実務ではこちらの書き方を多く使う
        -->
        <input type="text" th:field="*{registrationId}" id="registrationId">
        <!--
        <input type="text" name="registrationId" id="registrationId">
        とすると、input に入力された値が
        topicRegistrationForm オブジェクトのフィールドに自動バインディングされないので、
        @RequestParam で手動取得する必要がある
        -->
    </div>
    <div>
        <!-- ${...} ...の変数を参照する変数式 -->
        <label for="userId" th:text="${userId}"></label><br>
        <input type="text" th:field="*{userId}" id="userId">
    </div>
    <div>
        <label for="visitDate" th:text="${visitDate}"></label><br>
        <input type="date" th:field="*{visitDate}" id="visitDate">
    </div>
    <div>
        <label for="topicTitle" th:text="${topicTitle}"></label><br>
        <input type="text" th:field="*{topicTitle}" id="topicTitle">
    </div>
    <div>
        <label for="topicContent" th:text="${topicContent}"></label><br>
        <input type="text" th:field="*{topicContent}" id="topicContent">
    </div>
    <div>
        <!-- th:value で変数を view の value に反映できる -->
        <input type="submit" th:value="${messageRegister}">
    </div>
</form>
</body>
</html>
